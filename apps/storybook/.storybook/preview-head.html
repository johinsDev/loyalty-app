<!--
  Storybook can't use next/font (it isn't a Next app). The real apps load
  Fraunces + Inter via next/font; here we load them from Google Fonts and bind
  the same CSS variables (--font-fraunces / --font-inter) the next/font setup
  exposes, so the design system renders on-brand in Storybook and in the
  design-sync bundle.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --font-fraunces: "Fraunces";
    --font-inter: "Inter";
  }
</style>
