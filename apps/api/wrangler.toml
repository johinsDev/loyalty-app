# Standalone tRPC + Better Auth API on Cloudflare Workers (Hono).
# Phase 1: runs alongside the Next.js /api/trpc routes — nothing cuts over yet.
# `nodejs_compat` is required (Better Auth + process.env + crypto); the bundle
# stays "lean" by NOT importing the Node-heavy provider SDKs (Twilio/web-push/
# aws-sdk) — those sends go through Trigger.dev jobs. See the plan + wizard/api
# skill.
name = "loyalty-api"
account_id = "9fe45bafe8be5dd315f8164b97ff9399"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Emit + upload source maps so stack traces (Cloudflare observability + the
# Sentry handler) symbolicate to the original TS instead of the bundle. See
# `.claude/skills/sentry/SKILL.md`.
upload_source_maps = true

[observability]
enabled = true

# Tags every server-side analytics event with the runtime env — the Worker has
# no Vercel `VERCEL_ENV`, so without this `baseProperties` (packages/api) would
# mis-tag every prod event as `development`.
[vars]
APP_ENV = "production"
# PostHog (analytics + flags via the Workers-safe fetch driver). The phc_ key is
# public/embeddable — already shipped in the FE bundle via NEXT_PUBLIC — so it's
# a committed [var], not a secret. Enables server-side flag eval + analytics in
# the prod Worker (the Worker doesn't read Infisical /shared).
NEXT_PUBLIC_POSTHOG_KEY = "phc_HFbTepSwVVU52lEno4WzrPg7TB70nmpVMu6thSWvAk3"
NEXT_PUBLIC_POSTHOG_HOST = "https://us.i.posthog.com"
# Shortlinks redirect base (short host + /r). Non-secret config. Needs the
# `l.t4diverclub.app` route + DNS (Fase 4) to actually serve; until then this
# is the canonical prod value the admin create + jobs `shorten()` build URLs from.
SHORTLINK_BASE_URL = "https://l.t4diverclub.app/r"

# Production custom domain — wrangler creates the DNS record + edge cert on the
# t4diverclub.app zone (already in this Cloudflare account).
[[routes]]
pattern = "api.t4diverclub.app"
custom_domain = true

# Per-PR previews are deployed by scripts/cloudflare/deploy-preview-worker.ts as
# `loyalty-api-pr-<n>` on `api.pr-<n>.t4diverclub.app` (a generated config); this
# `[env.preview]` stanza is the static fallback. Named envs don't inherit the
# top-level `[vars]`, so APP_ENV is redeclared.
[env.preview]
name = "loyalty-api-preview"

[env.preview.vars]
APP_ENV = "preview"
