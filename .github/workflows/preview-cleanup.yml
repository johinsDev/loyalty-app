name: preview-cleanup

# On PR close: remove the branch-scoped Vercel env vars and destroy the
# preview-pr-<n> Turso database. Every step is idempotent.
#
# Same gate (PREVIEW_PIPELINE_ENABLED) + Infisical machine-identity auth
# as preview.yml.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

env:
  INFISICAL_PROJECT_ID: 90546a83-b585-4e36-bcf9-63898e633c53

jobs:
  cleanup:
    name: tear down PR preview resources
    if: ${{ vars.PREVIEW_PIPELINE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Authenticate Infisical
        env:
          CID: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          CSEC: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
        run: |
          TOKEN=$(infisical login --method=universal-auth --client-id="$CID" --client-secret="$CSEC" --plain --silent)
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Remove branch-scoped Vercel env (web + admin)
        env:
          GIT_BRANCH: ${{ github.head_ref }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          bun run scripts/vercel/unset-preview-env.ts

      - name: Destroy the preview DB
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          bun run scripts/db/delete-preview-db.ts
