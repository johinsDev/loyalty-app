name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to keep CI snappy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  validate:
    name: validate (lint, knip, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Sane placeholders so build-time scripts that read env (e.g. dotenv-cli)
      # don't fail. Real secrets aren't needed for unit tests.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?sslmode=disable
      BETTER_AUTH_SECRET: ci-placeholder-secret-change-me-32chars
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Knip (dead code / unused deps)
        run: bun run knip

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  e2e:
    name: e2e (Playwright)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skipped by default until apps/e2e/tests has real specs AND we have
    # stable URLs to point at. With Vercel auto-deploy, the URLs come from
    # repo Variables (set them when custom domains land — LOY-43):
    #   - vars.WEB_PROD_URL
    #   - vars.ADMIN_PROD_URL
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install
        run: bun install --frozen-lockfile

      - name: Install browsers
        run: bun --cwd apps/e2e exec playwright install --with-deps chromium webkit

      - name: Run
        run: bun --cwd apps/e2e run test
        env:
          E2E_WEB_URL: ${{ vars.WEB_PROD_URL }}
          E2E_ADMIN_URL: ${{ vars.ADMIN_PROD_URL }}

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/e2e/test-results/
          retention-days: 7
