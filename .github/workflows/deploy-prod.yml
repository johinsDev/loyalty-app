name: deploy-prod

# Ship the whole prod backend on every push to main that touches it: apply DB
# migrations, deploy the API Worker (loyalty-api → api.t4diverclub.app), and
# deploy the Trigger.dev jobs + sync their env. Vercel's Git integration already
# auto-deploys the FE (web/admin/storybook); this workflow covers everything else.
#
# Auth is the SAME single Infisical machine identity as the preview pipeline (the
# only two GitHub secrets); everything else (CLOUDFLARE_*, the Worker [vars],
# DATABASE_URL/TURSO_AUTH_TOKEN, TRIGGER_ACCESS_TOKEN, the jobs' synced env) comes
# from Infisical prod (/ci + /api + /shared via --recursive). Worker deploys are
# code-only (WORKER_DEPLOY_SKIP_SECRETS=true) — its secrets persist; run
# `bun run worker:deploy:prod` locally to re-sync them after a rotation.
#
# Order: migrate → Worker → Trigger (code never deploys against an un-migrated DB).
# Gated on the repo variable PROD_DEPLOY_ENABLED=true.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "scripts/cloudflare/deploy-prod-worker.ts"
      - ".github/workflows/deploy-prod.yml"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  INFISICAL_PROJECT_ID: 90546a83-b585-4e36-bcf9-63898e633c53

jobs:
  deploy:
    name: deploy prod (migrate + Worker + Trigger)
    if: ${{ vars.PROD_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Authenticate Infisical
        env:
          CID: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          CSEC: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
        run: |
          TOKEN=$(infisical login --method=universal-auth --client-id="$CID" --client-secret="$CSEC" --plain --silent)
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # Apply Drizzle migrations to the prod Turso DB before any code deploys.
      # Idempotent via drizzle's journal — a no-op when there are no new ones.
      # DATABASE_URL + TURSO_AUTH_TOKEN come from prod /api.
      - name: Run DB migrations (prod)
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --recursive --token="$INFISICAL_TOKEN" --
          bun run --cwd packages/db db:migrate

      # Generates wrangler.prod.toml ([vars] from Infisical) + `wrangler deploy`.
      # Secrets are skipped (already set; persist across deploys). CLOUDFLARE_* +
      # the [vars] provider values come from prod /ci + /api + /shared.
      - name: Deploy prod Worker (code only)
        env:
          WORKER_DEPLOY_SKIP_SECRETS: "true"
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --recursive --token="$INFISICAL_TOKEN" --
          bun scripts/cloudflare/deploy-prod-worker.ts

      # Deploy the Trigger.dev jobs to prod + sync their env. syncEnvVars
      # (trigger.config.ts) UPSERTS — it pushes the Infisical-injected vars
      # (DATABASE_URL/auth, realtime, VAPID, PUSH_PROVIDER) without deleting the
      # dashboard-managed ones (Twilio/Resend). No --env flag → the project's prod
      # environment. TRIGGER_ACCESS_TOKEN comes from prod /ci.
      - name: Deploy Trigger.dev jobs (prod) + sync env
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --recursive --token="$INFISICAL_TOKEN" --
          bash -c 'cd packages/jobs && bunx trigger.dev@4.5.6 deploy'

      # Post a release summary to the deploys Slack channel. always() so it also
      # reports a failed deploy. Inert (no-op) until SLACK_DEPLOY_WEBHOOK_URL is in
      # Infisical prod /ci — see scripts/slack/notify-deploy.sh.
      - name: Notify Slack (deploys)
        if: ${{ always() }}
        env:
          DEPLOY_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          bash scripts/slack/notify-deploy.sh
