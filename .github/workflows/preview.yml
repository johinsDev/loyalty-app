name: preview

# Per-PR preview database (Turso): clone production into preview-pr-<n>,
# apply the PR's migrations, mask its PII, and pin the connection on the
# Vercel web + admin preview deploys.
#
# Inert until configured: gated on the repo variable
# PREVIEW_PIPELINE_ENABLED=true. Auth is a single Infisical machine identity
# (the ONLY two GitHub secrets); everything else (TURSO_*, VERCEL_*) is
# pulled from Infisical prod:/ci:
#   INFISICAL_MACHINE_IDENTITY_CLIENT_ID
#   INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET
# See .claude/skills/env-deploy/SKILL.md → "Preview pipeline".
#
# The `clone + mask preview DB, wire Vercel` job is a REQUIRED status check on
# `main` (with the Vercel admin/web deploys), so a PR can't merge unless its
# preview DB + API Worker + FE deploy succeed.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  INFISICAL_PROJECT_ID: 90546a83-b585-4e36-bcf9-63898e633c53

jobs:
  preview-db:
    name: clone + mask preview DB, wire Vercel
    if: ${{ vars.PREVIEW_PIPELINE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Authenticate Infisical
        env:
          CID: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          CSEC: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
        run: |
          TOKEN=$(infisical login --method=universal-auth --client-id="$CID" --client-secret="$CSEC" --plain --silent)
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # Clones prod via the Turso Platform API + mints a token. Writes
      # database_url / auth_token / db_name to $GITHUB_OUTPUT (token masked).
      # TURSO_API_TOKEN / TURSO_ORG / PREVIEW_SOURCE_DB come from prod:/ci.
      - name: Create preview DB (clone prod)
        id: db
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          bun run scripts/db/create-preview-db.ts

      # The clone already has prod's schema; this applies only THIS PR's
      # new migrations (drizzle's journal makes it idempotent).
      - name: Apply this PR's migrations
        env:
          DATABASE_URL: ${{ steps.db.outputs.database_url }}
          TURSO_AUTH_TOKEN: ${{ steps.db.outputs.auth_token }}
        run: bun run --cwd packages/db db:migrate

      - name: Mask PII
        env:
          DATABASE_URL: ${{ steps.db.outputs.database_url }}
          TURSO_AUTH_TOKEN: ${{ steps.db.outputs.auth_token }}
        run: bun run scripts/db/mask-preview-db.ts

      # Idempotent: creates a deterministic admin user + promotes it to
      # owner so anyone can log into this PR's preview without going
      # through Google OAuth. Reads ADMIN_PREVIEW_EMAIL / _PASSWORD +
      # BETTER_AUTH_SECRET from Infisical staging — backend secrets now
      # live in /api (NOT synced to FE Vercel); /shared keeps only the
      # FE-facing config. Both paths are injected (nested infisical run).
      # DATABASE_URL / TURSO_AUTH_TOKEN come from THIS PR's masked DB —
      # override them after `infisical run` so the staging values don't win.
      - name: Seed deterministic preview admin
        env:
          PR_DB_URL: ${{ steps.db.outputs.database_url }}
          PR_DB_TOKEN: ${{ steps.db.outputs.auth_token }}
        run: |
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging \
            --path=/api --token="$INFISICAL_TOKEN" -- \
            infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging \
            --path=/shared --token="$INFISICAL_TOKEN" -- \
            bash -c 'DATABASE_URL="$PR_DB_URL" TURSO_AUTH_TOKEN="$PR_DB_TOKEN" \
              bun run --cwd packages/auth src/seed-preview-admin.ts'

      # NOTE: the FE preview is a thin client of the Worker, so it no longer gets
      # DATABASE_URL / TURSO_AUTH_TOKEN / STORAGE_KEY_PREFIX / CACHE_KEY_PREFIX /
      # REALTIME_ROOM_PREFIX pinned on Vercel — the Worker owns the backend (those
      # reach it via wrangler in the deploy step below). The only per-PR Vercel pin
      # the FE needs is NEXT_PUBLIC_API_URL (pinned in the Worker step), which also
      # doubles as the build-ready sentinel for each app's vercel.json ignoreCommand.

      # Deploy this PR's standalone API Worker (api.pr-<n>.t4diverclub.app)
      # against the masked clone, point the FE preview at it
      # (NEXT_PUBLIC_API_URL, pinned BEFORE the build below so it's inlined),
      # and assign the admin./app. FE subdomains. The auth cookie is scoped to
      # .pr-<n>.t4diverclub.app (no leak to prod / other PRs). Gated separately
      # from the DB pipeline. Backend secrets (BETTER_AUTH_SECRET — must match the
      # seeded preview admin —, R2_*, REALTIME/TRIGGER, providers) come from
      # staging/api; FE-facing config stays in staging/shared; CLOUDFLARE_* /
      # VERCEL_* from prod/ci. Innermost (/shared) wins on any overlap. P3.
      - name: Deploy preview API Worker + point FE at it
        if: ${{ vars.PREVIEW_API_WORKER_ENABLED == 'true' }}
        env:
          PR_NUMBER: ${{ github.event.number }}
          GIT_BRANCH: ${{ github.head_ref }}
          PREVIEW_DATABASE_URL: ${{ steps.db.outputs.database_url }}
          PREVIEW_AUTH_TOKEN: ${{ steps.db.outputs.auth_token }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging
          --path=/api --token="$INFISICAL_TOKEN" --
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging
          --path=/shared --token="$INFISICAL_TOKEN" -- bash -c '
            # Realtime publisher points at this PR dedicated party (not staging).
            export PARTYKIT_HOST="partykit.pr-${PR_NUMBER}.t4diverclub.app"
            bun run scripts/cloudflare/deploy-preview-worker.ts
            ENV_KEY=NEXT_PUBLIC_API_URL ENV_VALUE="https://api.pr-${PR_NUMBER}.t4diverclub.app" bun run scripts/vercel/set-preview-env.ts
            bun run scripts/vercel/alias-preview-domains.ts
          '

      # Assert the deployed Worker actually serves on its custom domain (/,
      # tRPC health.ping, Better Auth, CORS) — not just that `wrangler deploy`
      # exited 0. A dead/misconfigured Worker fails the job (a required check).
      # No secrets needed (public endpoints); waits out the first-deploy cert.
      - name: Smoke-test the preview API Worker
        if: ${{ vars.PREVIEW_API_WORKER_ENABLED == 'true' }}
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: bun run scripts/cloudflare/smoke-preview-worker.ts

      # Per-PR PartyKit (realtime) party — a dedicated party for this PR instead
      # of the shared staging one. Rides the same flag as the API Worker (they're
      # both per-PR backend infra). The Worker (above) + jobs (below) publish to
      # it and the FE subscribes to it. CLOUDFLARE_* from /ci, REALTIME_AUTH_SECRET
      # from staging/api, VERCEL_* from /ci. Must run before the Vercel build
      # trigger so the FE build picks up the pinned host.
      - name: Deploy preview realtime party + point FE at it
        if: ${{ vars.PREVIEW_API_WORKER_ENABLED == 'true' }}
        env:
          PR_NUMBER: ${{ github.event.number }}
          GIT_BRANCH: ${{ github.head_ref }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging
          --path=/api --token="$INFISICAL_TOKEN" -- bash -c '
            bun run scripts/cloudflare/deploy-preview-partykit.ts
            ENV_KEY=NEXT_PUBLIC_PARTYKIT_HOST ENV_VALUE="partykit.pr-${PR_NUMBER}.t4diverclub.app" bun run scripts/vercel/set-preview-env.ts
          '

      # The push auto-deploy races this pin and is skipped by each app's
      # vercel.json ignoreCommand (preview build skipped while NEXT_PUBLIC_API_URL
      # is absent). Now that the env IS pinned, trigger the real build.
      - name: Trigger Vercel preview build (env now pinned)
        env:
          GIT_BRANCH: ${{ github.head_ref }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" --
          bun run scripts/vercel/trigger-preview-deploy.ts

      # Deploy a Trigger.dev preview branch for this PR. syncEnvVars (in
      # trigger.config.ts) forwards the deploy-time env — the per-PR
      # DATABASE_URL (step env) + the staging base (providers, VAPID, …) — into
      # the Trigger preview-branch environment, so its tasks run against the
      # PR's masked DB. Gated separately: needs preview branches enabled in the
      # Trigger dashboard. TRIGGER_ACCESS_TOKEN comes from /ci.
      - name: Deploy Trigger.dev preview branch
        if: ${{ vars.TRIGGER_PREVIEW_ENABLED == 'true' }}
        env:
          DATABASE_URL: ${{ steps.db.outputs.database_url }}
          TURSO_AUTH_TOKEN: ${{ steps.db.outputs.auth_token }}
          GIT_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.number }}
          # Must match the per-PR prefix the Worker uses (deploy-preview-worker
          # sets the same pr-<n>- on the Worker), so jobs publishes realtime
          # events to the SAME room the web/admin clients subscribe to via the
          # Worker-issued ticket. syncEnvVars forwards it into the Trigger env.
          REALTIME_ROOM_PREFIX: pr-${{ github.event.number }}-
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging
          --path=/api --token="$INFISICAL_TOKEN" --
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=staging
          --path=/shared --token="$INFISICAL_TOKEN" --
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" -- bash -c '
            # jobs (a realtime publisher) point at this PR dedicated party too.
            export PARTYKIT_HOST="partykit.pr-${PR_NUMBER}.t4diverclub.app"
            cd packages/jobs && bunx trigger.dev@latest deploy --env preview --branch "$GIT_BRANCH"
          '

      # Point web/admin at the PR's Trigger preview branch (branch-scoped, so
      # other previews are unaffected). The Trigger SDK reads TRIGGER_PREVIEW_BRANCH.
      - name: Pin TRIGGER_PREVIEW_BRANCH on Vercel preview
        if: ${{ vars.TRIGGER_PREVIEW_ENABLED == 'true' }}
        env:
          GIT_BRANCH: ${{ github.head_ref }}
        run: >
          infisical run --projectId "$INFISICAL_PROJECT_ID" --env=prod
          --path=/ci --token="$INFISICAL_TOKEN" -- bash -c
          'ENV_KEY=TRIGGER_PREVIEW_BRANCH ENV_VALUE="$GIT_BRANCH" bun run scripts/vercel/set-preview-env.ts'

      - name: Comment on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-db -->';
            const body = `${marker}\n🔒 **Preview DB ready** — \`preview-pr-${{ github.event.number }}\` is a **masked clone of production** (PII faked with referential integrity intact; owner login preserved), pinned to this PR's Vercel preview for **web** and **admin**. Recreated from fresh prod data on every push, destroyed when the PR closes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      # Same upsert-by-marker pattern as the DB comment, for the per-PR API
      # Worker + FE subdomains. Only when the Worker pipeline is enabled.
      - name: Comment the preview API Worker URLs
        if: ${{ vars.PREVIEW_API_WORKER_ENABLED == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const n = ${{ github.event.number }};
            const zone = 't4diverclub.app';
            const marker = '<!-- preview-api -->';
            const body = `${marker}\n🌐 **Preview API Worker ready** — this PR runs against its own standalone Worker on the masked clone.\n\n| Surface | URL |\n| --- | --- |\n| API (Worker) | https://api.pr-${n}.${zone} |\n| Admin | https://admin.pr-${n}.${zone} |\n| Web | https://app.pr-${n}.${zone} |\n\nLog in with the **seeded preview admin** (email/password). The session cookie is scoped to \`.pr-${n}.${zone}\`. First deploy: the custom-domain certs can take a couple of minutes. Torn down when the PR closes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
