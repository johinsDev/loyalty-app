name: preview

# Per-PR preview database: create an ANONYMIZED Neon branch from
# production (Neon's native PostgreSQL Anonymizer — masked copy with
# referential integrity intact), apply the PR's migrations, and pin its
# connection string on the Vercel web + admin preview deploys.
#
# Inert until configured: gated on the repo variable
# PREVIEW_PIPELINE_ENABLED=true. Required secrets:
#   NEON_API_KEY, NEON_PROJECT_ID, NEON_DATABASE_NAME, NEON_ROLE_NAME
#   VERCEL_TOKEN, VERCEL_PROJECT_ID_WEB, VERCEL_PROJECT_ID_ADMIN
# Optional: NEON_PARENT_BRANCH_ID, VERCEL_TEAM_ID.
# See .claude/skills/env-deploy/SKILL.md → "Preview pipeline".

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  neon-preview:
    name: anonymized Neon branch + preview wiring
    if: ${{ vars.PREVIEW_PIPELINE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install
        run: bun install --frozen-lockfile

      - name: Create anonymized branch from production
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ secrets.NEON_DATABASE_NAME }}
          NEON_ROLE_NAME: ${{ secrets.NEON_ROLE_NAME }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
          PR_NUMBER: ${{ github.event.number }}
        run: bun run scripts/db/create-neon-branch.ts

      # The branch is a copy of prod (schema already present); this only
      # applies migrations NEW in this PR. drizzle-kit's journal makes it
      # idempotent. No seed: the anonymized prod copy already has the org
      # + members.
      - name: Apply this PR's migrations to the branch
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
        run: bun run --cwd packages/db db:migrate

      - name: Pin DATABASE_URL on Vercel preview (web + admin)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID_WEB: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          PREVIEW_DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          GIT_BRANCH: ${{ github.head_ref }}
        run: bun run scripts/vercel/set-preview-env.ts

      # Trigger.dev preview deploy is deliberately NOT here: `trigger
      # deploy` still crashes on the module-load env throw (the closed
      # #42/#43 problem). Fase 4 re-introduces lazy-init + syncEnvVars
      # and adds the Trigger preview deploy step at this point.

      - name: Comment on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-db -->';
            const body = `${marker}\n🔒 **Preview DB ready** — anonymized Neon branch \`preview/pr-${{ github.event.number }}\` (masked copy of production, referential integrity intact) is pinned to this PR's Vercel preview for **web** and **admin**. It is recreated from fresh prod data on every push and deleted when the PR closes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
